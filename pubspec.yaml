name: node_app
description: "National Order & Distribution Exchange"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: any
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  flutter_timezone: ^5.0.2
  riverpod_annotation: any
  provider: ^6.1.5
  drift: any
  sqlite3: ^2.4.6
  sqlite3_flutter_libs: ^0.5.2
  path_provider: ^2.1.5
  path: ^1.9.1
  google_fonts: ^8.0.2
  fpdart: ^1.2.0
  supabase_flutter: ^2.12.0
  equatable: ^2.0.7
  video_player: ^2.10.1
  go_router: ^14.6.2
  get_it: ^8.0.3
  injectable: ^2.5.0
  dio: ^5.8.0
  shared_preferences: ^2.3.5
  dartz: ^0.10.1
  connectivity_plus: ^6.1.4
  infinite_scroll_pagination: ^5.1.1
  flutter_svg: ^2.0.10
  cached_network_image: ^3.4.1
  flutter_staggered_grid_view: ^0.7.0
  lucide_icons: ^0.257.0
  hugeicons: ^1.1.5
  flutter_localization: ^0.3.3
  intl: ^0.20.2
  auto_size_text: ^3.0.0
  country_picker: ^2.0.27
  photo_manager: ^3.9.0
  email_validator: ^2.1.1
  toastification: ^3.0.3
  password_strength_checker: ^1.3.2
  shimmer: ^3.0.0
  flutter_secure_storage: ^10.0.0
  minio: ^3.5.8

  permission_handler: ^11.3.1
  visibility_detector: ^0.4.0
  uuid: ^4.5.3

  http: ^1.6.0
  mime: ^2.0.0
  flutter_dotenv: ^5.1.0
  firebase_core: ^3.10.1
  firebase_messaging: ^15.2.2
  crown_ui: ^0.1.0
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  pdf: ^3.12.0
  printing: ^5.14.3
  flutter_cache_manager: ^3.4.1
  mobile_scanner: ^7.2.0
  share_plus: ^12.0.2
  open_filex: ^4.6.0
  pdfrx: ^2.2.24
  google_sign_in: ^7.2.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.15
  drift_dev: any
  injectable_generator: ^2.7.0
  riverpod_generator: any
  mockito: ^5.4.5
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - .env
    - assets/adi-registration.properties
    - assets/icon/nodeicon.png
    - assets/icon/nodeicon.svg
    - assets/icon/nexus.png
    - assets/google/google-logo.png
    - assets/welcomeimages/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  fonts:
    - family: Comic Relief
      fonts:
        - asset: fonts/Comic_Relief/ComicRelief-Regular.ttf
        - asset: fonts/Comic_Relief/ComicRelief-Bold.ttf
          weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/nodeicon_full.png"
  min_sdk_android: 21
  adaptive_icon_background: "#12BBF0"
  adaptive_icon_foreground: "assets/icon/nodeicon_foreground.png"
  remove_alpha_ios: true
  web:
    generate: false
  windows:
    generate: true
    image_path: "assets/icon/nodeicon_full.png"
    icon_size: 48

